services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pero_backend_app_dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: file:./dev.db
      NODE_ENV: development
      WS_PORT: 8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    command: sh -c "npm ci && npx prisma generate && npx prisma migrate deploy && npm run dev"

volumes:
  app_node_modules:
